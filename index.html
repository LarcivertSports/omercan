<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player & Kanal Listesi</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Video Oynatıcı Alanı */
        .player-section {
            width: 100%;
            max-width: 1000px; /* Video genişliği */
            aspect-ratio: 16 / 9; /* Standart video oranı */
            background-color: #000;
            margin-top: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Alt Kanal Listesi Konteynırı */
        .list-container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            box-sizing: border-box;
        }

        .list-header {
            border-bottom: 2px solid #e50914;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        /* Kanal Izgarası (Grid) */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .channel-item {
            background-color: #2a2a2a;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: #efefef;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            display: block;
        }

        .channel-item:hover {
            background-color: #e50914;
            color: white;
            transform: translateY(-3px);
            border-color: #ff4d4d;
        }

        .channel-item.active {
            border-color: #e50914;
            background-color: #1a1a1a;
        }

        /* Mobil Duyarlılık */
        @media (max-width: 600px) {
            .channel-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="player-section">
        <iframe 
            name="video_ekrani" 
            src="https://zeustv229.com/ch.html?id=b1" 
            allowfullscreen 
            scrolling="no">
        </iframe>
    </div>

    <div class="list-container">
        <div class="list-header">
            📺 Yayın Akışı & Kanallar
        </div>
        
        <div class="channel-grid">
            <a href="https://zeustv229.com/ch.html?id=b1" target="video_ekrani" class="channel-item">Bein Sports 1</a>
            <a href="https://zeustv229.com/ch.html?id=b2" target="video_ekrani" class="channel-item">Bein Sports 2</a>
            <a href="https://zeustv229.com/ch.html?id=b3" target="video_ekrani" class="channel-item">Bein Sports 3</a>
            <a href="https://zeustv229.com/ch.html?id=b4" target="video_ekrani" class="channel-item">Bein Sports 4</a>
            <a href="https://zeustv229.com/ch.html?id=b5" target="video_ekrani" class="channel-item">Bein Sports 5</a>
            <a href="https://zeustv229.com/ch.html?id=b1max" target="video_ekrani" class="channel-item">Haber 24</a>
            <a href="https://zeustv229.com/ch.html?id=b2max" target="video_ekrani" class="channel-item">Doğa Belgesel</a>
            <a href="https://zeustv229.com/ch.html?id=muzik" target="video_ekrani" class="channel-item">Müzik Hit</a>
        </div>
    </div>

    <p style="color: #555; font-size: 0.8rem; margin-top: 30px;">
        Not: Kanallar arası geçiş için listedeki butonlara tıklayın.
    </p>

</body>
</html>
