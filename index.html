<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultwidgetversion='2' b:layoutsversion='3' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/namespaces/blogger/template/kind' xmlns:data='http://www.google.com/namespaces/blogger/template/data' xmlns:expr='http://www.google.com/namespaces/blogger/template/expression'>
<head>
  <meta content='width=device-width, initial-scale=1' name='viewport'/>
  <title><data:view.title.escape/></title>
  <b:skin><![CDATA[
    /* CSS Tasarımı */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 20px 0;
      text-align: center;
    }
    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
    }
    .post-card {
      background: white;
      margin-bottom: 30px;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .post-title a {
      color: #2c3e50;
      text-decoration: none;
      font-size: 24px;
      font-weight: bold;
    }
    .post-meta {
      font-size: 13px;
      color: #7f8c8d;
      margin: 10px 0;
    }
    .post-snippet {
      line-height: 1.6;
    }
    .read-more {
      display: inline-block;
      margin-top: 15px;
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #95a5a6;
    }
  ]]></b:skin>
</head>

<body>
  <header>
    <h1><data:blog.title/></h1>
  </header>

  <div class='container'>
    <b:section id='main-content' showaddelement='yes'>
      <b:widget id='Blog1' locked='true' title='Blog Kayıtları' type='Blog'>
        <b:includable id='main'>
          <b:loop values='data:posts' var='post'>
            <article class='post-card'>
              <h2 class='post-title'>
                <a expr:href='data:post.url'><data:post.title/></a>
              </h2>
              <div class='post-meta'>
                <span><data:post.dateHeader/></span>
              </div>
              <div class='post-snippet'>
                <b:if cond='data:post.snippets.short'>
                  <data:post.snippets.short/>...
                </b:if>
              </div>
              <a class='read-more' expr:href='data:post.url'>Devamını Oku →</a>
            </article>
          </b:loop>
        </b:includable>
      </b:widget>
    </b:section>
  </div>

  <footer>
    <p>&copy; <data:blog.title/> - <script>document.write(new Date().getFullYear());</script></p>
  </footer>
</body>
</html>
