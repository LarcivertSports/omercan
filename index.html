<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı TV ve Kanal Listesi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
        }
        /* Sol Menü (Kanal Listesi) Tasarımı */
        .sidebar {
            width: 260px;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            text-align: center;
            font-size: 1.2rem;
            padding: 20px 0;
            margin: 0;
            background-color: #e50914; /* Kırmızı başlık rengi */
            color: white;
            position: sticky;
            top: 0;
        }
        .channel-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .channel-list li {
            border-bottom: 1px solid #333;
        }
        .channel-list li a {
            padding: 15px 20px;
            color: #d1d1d1;
            text-decoration: none;
            display: block;
            transition: background 0.3s, color 0.3s;
        }
        .channel-list li a:hover {
            background-color: #333;
            color: #ffffff;
        }
        /* Sağ Taraf (Video Oynatıcı) Tasarımı */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #000000;
        }
        .video-container {
            flex: 1;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Kanal Listesi</h2>
        <ul class="channel-list">
            <li><a href="https://zeustv229.com/ch.html?id=b1" target="tv_frame">📺 Zeus TV (Ana Yayın)</a></li>
            <li><a href="https://zeustv229.com/ch.html?id=b2" target="tv_frame">📺 Kanal 2 (Örnek)</a></li>
            <li><a href="https://zeustv229.com/ch.html?id=b3" target="tv_frame">📺 Kanal 3 (Örnek)</a></li>
            <li><a href="https://zeustv229.com/ch.html?id=spor" target="tv_frame">⚽ Spor Kanalı</a></li>
            <li><a href="https://zeustv229.com/ch.html?id=sinema" target="tv_frame">🎬 Sinema Kanalı</a></li>
            <li><a href="https://zeustv229.com/ch.html?id=belgesel" target="tv_frame">🌍 Belgesel Kanalı</a></li>
            <li><a href="https://zeustv229.com/ch.html?id=haber" target="tv_frame">📰 Haber Kanalı</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="video-container">
            <iframe name="tv_frame" src="https://zeustv229.com/ch.html?id=b1" allowfullscreen="true" scrolling="no"></iframe>
        </div>
    </div>

</body>
</html>
