<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Otomatik Kanal Listesi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0b0b0b;
            color: #efefef;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #e50914;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .video-section {
            flex: 3;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }
        video {
            width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .playlist-section {
            flex: 1;
            background: #141414;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }
        .playlist-header {
            padding: 15px;
            background: #1f1f1f;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        #channelList {
            overflow-y: auto;
            flex: 1;
        }
        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #222;
            transition: 0.2s;
        }
        .channel-item:hover { background: #2a2a2a; }
        .channel-item.active { background: #333; border-left: 4px solid #e50914; }
        .channel-item img {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            object-fit: contain;
            background: #fff;
            border-radius: 4px;
        }
        .loading { padding: 20px; text-align: center; color: #888; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .playlist-section { height: 300px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Canlı TV Oynatıcı</h2>
</div>

<div class="container">
    <div class="video-section">
        <video id="videoPlayer" controls autoplay></video>
        <div id="currentTitle" style="margin-top:10px; color:#aaa;">Yayın seçiniz...</div>
    </div>

    <div class="playlist-section">
        <div class="playlist-header">Kanallar</div>
        <div id="channelList">
            <div class="loading">Liste yükleniyor...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
    const m3uUrl = 'https://raw.githubusercontent.com/LarcivertSports/omercan/refs/heads/main/omarcan.m3u';
    const video = document.getElementById('videoPlayer');
    const channelListContainer = document.getElementById('channelList');
    const currentTitle = document.getElementById('currentTitle');
    let hls = new Hls();

    async function fetchPlaylist() {
        try {
            const response = await fetch(m3uUrl);
            const data = await response.text();
            parseM3U(data);
        } catch (error) {
            channelListContainer.innerHTML = '<div class="loading">Liste yüklenemedi! (CORS hatası olabilir)</div>';
        }
    }

    function parseM3U(content) {
        const lines = content.split('\n');
        channelListContainer.innerHTML = '';
        let currentChannel = {};

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                // Kanal adını ve logoyu ayıkla
                const nameMatch = line.split(',').pop();
                const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                
                currentChannel.name = nameMatch || "Bilinmeyen Kanal";
                currentChannel.logo = logoMatch ? logoMatch[1] : 'https://via.placeholder.com/40?text=TV';
            } else if (line.startsWith('http')) {
                currentChannel.url = line;
                createChannelElement(currentChannel);
                currentChannel = {}; // Objeyi sıfırla
            }
        });
    }

    function createChannelElement(channel) {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.innerHTML = `
            <img src="${channel.logo}" onerror="this.src='https://via.placeholder.com/40?text=TV'">
            <span>${channel.name}</span>
        `;
        div.onclick = () => playChannel(channel.url, channel.name, div);
        channelListContainer.appendChild(div);
    }

    function playChannel(url, name, element) {
        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        currentTitle.innerText = "Oynatılıyor: " + name;

        if (Hls.isSupported()) {
            hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    // Başlat
    fetchPlaylist();
</script>

</body>
</html>
