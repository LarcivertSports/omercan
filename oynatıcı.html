<!DOCTYPE html>
<html>
<head>
    <title>⚽ VPN-FREE M3U Player</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:Arial; overflow:hidden; }
        #player { width:100vw; height:100vh; }
        .controls { position:fixed; top:10px; left:10px; z-index:999; background:rgba(0,0,0,0.8); padding:15px; border-radius:10px; }
        select, button { background:#f00; color:#fff; border:none; padding:8px 12px; margin:5px; border-radius:5px; cursor:pointer; }
    </style>
</head>
<body>
    <video id="player" controls autoplay muted></video>
    
    <div class="controls">
        <select id="channels" onchange="loadChannel()">
            <option>Yükleniyor...</option>
        </select>
        <button onclick="toggleProxy()">Proxy ON/OFF</button>
        <span id="status">Bağlanıyor...</span>
    </div>

    <script>
        const M3U_URL = 'https://raw.githubusercontent.com/LarcivertSports/omercan/refs/heads/main/omarcan.m3u';
        let channels = [], useProxy = true;
        
        // PROXY POOL (VPN bypass)
        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://thingproxy.freeboard.io/fetch/',
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://cors-anywhere.herokuapp.com/'
        ];
        
        async function loadM3U() {
            let m3uContent = '';
            for(let proxy of proxies) {
                try {
                    const url = proxy + encodeURIComponent(M3U_URL);
                    const res = await fetch(url);
                    m3uContent = await res.text();
                    if(m3uContent.includes('#EXTINF')) break;
                } catch(e) {}
            }
            
            // Parse channels
            channels = parseM3U(m3uContent);
            const select = document.getElementById('channels');
            select.innerHTML = channels.map((ch,i) => 
                `<option value="${i}">${ch.name}</option>`
            ).join('');
            
            document.getElementById('status').textContent = `✅ ${channels.length} kanal yüklendi`;
            loadChannel();
        }
        
        function parseM3U(content) {
            const lines = content.split('\n');
            let channels = [], current = {};
            
            for(let line of lines) {
                if(line.startsWith('#EXTINF')) {
                    current.name = line.match(/tvg-name="([^"]+)"/)?.[1] || line.match(/,(.*)/)?.[1] || 'Kanal';
                } else if(line.startsWith('http') && current.name) {
                    current.url = line.trim();
                    channels.push({...current});
                    current = {};
                }
            }
            return channels;
        }
        
        async function loadChannel() {
            const index = document.getElementById('channels').value;
            if(!channels[index]) return;
            
            const channel = channels[index];
            document.getElementById('status').textContent = `▶️ ${channel.name} yükleniyor...`;
            
            let streamUrl = channel.url;
            if(useProxy) {
                // Otomatik proxy uygula
                const proxy = proxies[0];
                streamUrl = proxy + encodeURIComponent(streamUrl);
            }
            
            const player = document.getElementById('player');
            player.src = streamUrl;
            player.play().catch(e=>console.log('Autoplay blocked'));
        }
        
        function toggleProxy() {
            useProxy = !useProxy;
            loadChannel();
        }
        
        loadM3U();
    </script>
</body>
</html>
